<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: sans-serif;
        }

        label {
            cursor: pointer;
            display: block;
        }
    </style>
</head>

<body>
    <form action="#" method="get" target="_blank" autocomplete="off">
        <p>O meu formulário</p>
        <p>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome" />
        </p>

        <p>
            <label for="dev1">Sou um dev</label>
            <input type="checkbox" id="dev1" name="dev1" value="sim" />
            <label for="dev2">Sou um dev</label>
            <input type="checkbox" id="dev2" name="dev2" value="sim" />
            <label for="dev3">Sou um dev</label>
            <input type="checkbox" id="dev3" name="dev3" value="sim" />
        </p>

        <p>
            Gênero:
            <label for="feminino">Feminino</label>
            <input type="radio" id="feminino" name="genero1" value="feminino" />
            <label for="masculino">Masculino</label>
            <input type="radio" id="masculino" name="genero2" value="masculino" />
            <label for="outro_outra">Outro ou Outra</label>
            <input type="radio" id="outro_outra" name="genero3" value="outro_outra" />
        </p>

        <p>
            <label for="datetime-local">Date:</label>
            <input type="datetime-local" id="datetime-local" name="datetime-local" value="2020-04-20T20:00" />
        </p>

        <p>
            <label for="time">Date:</label>
            <input type="time" id="time" name="time" value="20:00:01" />
        </p>

        <p>
            <label for="cor">Cor Preferida:</label>
            <input type="color" id="cor" name="cor" value="#0000ff" />
        </p>

        <p>
            <label for="email">Seu e-mail:</label>
            <input type="email" id="email" name="email" placeholder=" ex:email@email.com" />
        </p>

        <p>
            <label for="file">Sua Foto:</label>
            <input type="file" id="file" name="file" accept=".png, .svg,image/*" multiple />
        </p>

        <p>
            <label for="number">Number:</label>
            <input type="number" id="number" name="number" placeholder="Digite" min="10" max="50" step="5" />
        </p>

        <p>
            <label for="password">Sua senha:</label>
            <input type="password" id="password" name="password" placeholder="Digite sua senha!" />
        </p>

        <p>
            <label for="range">Range:</label>
            <input type="range" id="range" name="range" min="0" max="10" step="2" />
        </p>

        <p>
            <label for="url">Sua url!:</label>
            <input type="url" id="url" name="url" placeholder="URL!" />
        </p>

        <p>
            <label for="search">Pesquise!:</label>
            <input type="search" id="search" name="search" placeholder="search!" />
        </p>

        <p>
            <label for="select">Selecione alguma opção:</label>
            <select id="select" name="select">
                <optgroup label="Teste 1">
                    <option value="qualquer 1" label="Valor 1"></option>
                    <option value="qualquer 2" label="Valor 2"></option>
                    <option value="qualquer 3" label="Valor 3"></option>
                    <option value="qualquer 4" label="Valor 4"></option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="textarea">textarea:</label>
            <textarea name="textarea" id="textarea" rows="3" cols="5"></textarea>
        </p>

















        <p>
            <button type="reset">Resetar</button>
            <button type="submit">Enviar</button>
        </p>

    </form>

</body>

</html>
